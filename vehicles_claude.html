<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sporet Live Tracker</title>
  <script src="https://unpkg.com/deck.gl@8.9.35/dist.min.js"></script>
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e14;
      --panel: #111720;
      --border: #1e2d3d;
      --accent: #00e5ff;
      --accent2: #ff6b35;
      --text: #c8d8e8;
      --muted: #4a6070;
      --moving: #00e5ff;
      --stopped: #ff6b35;
    }

    html, body { width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }

    #map { position: absolute; inset: 0; }

    /* Header */
    #header {
      position: absolute;
      top: 20px; left: 20px;
      z-index: 10;
      background: rgba(10,14,20,0.85);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      padding: 14px 20px;
      backdrop-filter: blur(12px);
    }
    #header h1 {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
    }
    #header p {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      font-family: 'Space Mono', monospace;
    }

    /* Stats panel */
    #stats {
      position: absolute;
      top: 20px; right: 20px;
      z-index: 10;
      background: rgba(10,14,20,0.85);
      border: 1px solid var(--border);
      padding: 14px 18px;
      backdrop-filter: blur(12px);
      display: flex;
      gap: 24px;
    }
    .stat { text-align: center; }
    .stat-value {
      font-family: 'Space Mono', monospace;
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
    }
    .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-top: 4px;
    }
    .stat-value.moving { color: var(--moving); }
    .stat-value.stopped { color: var(--stopped); }
    .stat-value.total { color: var(--text); }

    /* Pulse ring for refresh */
    #refresh-ring {
      position: absolute;
      top: 20px; right: 20px;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      z-index: 11;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #refresh-ring.pulse {
      animation: ring-pulse 0.6s ease-out forwards;
    }
    @keyframes ring-pulse {
      0% { opacity:1; transform: scale(1); }
      100% { opacity:0; transform: scale(3); }
    }

    /* Tooltip */
    #tooltip {
      position: absolute;
      z-index: 20;
      pointer-events: none;
      background: rgba(10,14,20,0.95);
      border: 1px solid var(--border);
      border-top: 2px solid var(--accent);
      padding: 10px 14px;
      font-size: 12px;
      max-width: 240px;
      display: none;
      backdrop-filter: blur(8px);
    }
    #tooltip .t-name {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      margin-bottom: 6px;
      font-weight: 700;
      line-height: 1.3;
    }
    #tooltip .t-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 3px;
    }
    #tooltip .t-key { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; }
    #tooltip .t-val { font-family: 'Space Mono', monospace; font-size: 11px; }

    /* Status bar */
    #status {
      position: absolute;
      bottom: 20px; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      background: rgba(10,14,20,0.7);
      padding: 6px 14px;
      border: 1px solid var(--border);
      letter-spacing: 0.08em;
    }

    /* Legend */
    #legend {
      position: absolute;
      bottom: 60px; right: 20px;
      z-index: 10;
      background: rgba(10,14,20,0.85);
      border: 1px solid var(--border);
      padding: 10px 14px;
      backdrop-filter: blur(12px);
      font-size: 11px;
    }
    #legend-title {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .leg-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .leg-row:last-child { margin-bottom: 0; }
    .leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .leg-separator { border: none; border-top: 1px solid var(--border); margin: 6px 0; }
    .leg-dim { opacity: 0.4; }
  </style>
</head>
<body>

<div id="map"></div>
<div id="refresh-ring"></div>

<div id="header">
  <h1>Sporet Live Tracker</h1>
  <p id="last-update">Connecting...</p>
</div>

<div id="stats">
  <div class="stat">
    <div class="stat-value total" id="count-total">—</div>
    <div class="stat-label">Vehicles</div>
  </div>
  <div class="stat">
    <div class="stat-value moving" id="count-moving">—</div>
    <div class="stat-label">Moving</div>
  </div>
  <div class="stat">
    <div class="stat-value stopped" id="count-stopped">—</div>
    <div class="stat-label">Stopped</div>
  </div>
</div>

<div id="tooltip"></div>

<div id="legend">
  <div id="legend-title">Vehicle Types</div>
  <div id="legend-items"><!-- populated by JS --></div>
  <hr class="leg-separator"/>
  <div class="leg-row leg-dim"><div class="leg-dot" style="background:#aaa;border:1px dashed #aaa"></div><span style="color:var(--muted)">Not visible</span></div>
</div>

<div id="status">Initializing...</div>

<script>
const API_URL = 'https://maps.sporet.no/arcgis/rest/services/Proxy/Sporet/FeatureServer/2/query?f=json&outSr=4326&where=1%3D1&outFields=*&returnGeometry=true';
const REFRESH_MS = 15000;

let deckInstance = null;
let features = [];

// --- Map init using MapLibre + deck.gl overlay ---
const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    sources: {
      'carto-dark': {
        type: 'raster',
        tiles: ['https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png'],
        tileSize: 256,
        attribution: '© OpenStreetMap © CARTO'
      }
    },
    layers: [{ id: 'carto-dark', type: 'raster', source: 'carto-dark' }]
  },
  center: [15.0, 65.5],
  zoom: 4,
  antialias: true
});

map.on('load', () => {
  initDeck();
  fetchAndUpdate();
  setInterval(fetchAndUpdate, REFRESH_MS);
});

function initDeck() {
  deckInstance = new deck.MapboxOverlay({
    interleaved: false,
    layers: [],
    getTooltip: null
  });
  map.addControl(deckInstance);
}

async function fetchAndUpdate() {
  setStatus('Fetching...');
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    features = (data.features || []).filter(f => f.geometry && f.geometry.x != null);
    renderLayers();
    updateStats();
    triggerPulse();
    const now = new Date();
    document.getElementById('last-update').textContent =
      'Updated ' + now.toLocaleTimeString('no-NO');
    setStatus(`${features.length} vehicles loaded · refreshes every ${REFRESH_MS/1000}s`);
  } catch (e) {
    setStatus('Error fetching data: ' + e.message);
    console.error(e);
  }
}

// Color map by renderer_value type — [r, g, b]
const TYPE_COLORS = {
  'moving_scooter':   [0,   229, 255],
  'stopped_scooter':  [255, 107,  53],
  'moving_car':       [80,  220, 100],
  'stopped_car':      [255, 200,  40],
  'moving_boat':      [100, 160, 255],
  'stopped_boat':     [180, 100, 255],
  'moving_atv':       [0,   255, 180],
  'stopped_atv':      [255, 160,  60],
  'moving_tractor':   [200, 255,  80],
  'stopped_tractor':  [180, 130,  60],
  'default':          [180, 180, 180],
};

function typeColor(f) {
  const rv = (f.attributes.renderer_value || '').toLowerCase().trim();
  return TYPE_COLORS[rv] || TYPE_COLORS['default'];
}

function isMoving(f) {
  return f.attributes.speed > 0.5;
}

function isVisible(f) {
  return f.attributes.is_visible === 1;
}

function getFillColor(f) {
  const [r, g, b] = typeColor(f);
  return [r, g, b, isVisible(f) ? 220 : 60];
}

function getLineColor(f) {
  const [r, g, b] = typeColor(f);
  return [r, g, b, isVisible(f) ? 255 : 80];
}

function renderLayers() {
  const scatterLayer = new deck.ScatterplotLayer({
    id: 'vehicles',
    data: features,
    getPosition: f => [f.geometry.x, f.geometry.y],
    getRadius: f => isMoving(f) ? 6000 : 4000,
    getFillColor,
    getLineColor,
    lineWidthMinPixels: 1,
    stroked: true,
    radiusMinPixels: 4,
    radiusMaxPixels: 14,
    pickable: true,
    onHover: handleHover,
    updateTriggers: { getPosition: features, getFillColor: features, getLineColor: features }
  });

  // Arrow layer for moving vehicles (direction indicator)
  const arrowLayer = new deck.IconLayer({
    id: 'arrows',
    data: features.filter(isMoving),
    getPosition: f => [f.geometry.x, f.geometry.y],
    getAngle: f => -(f.attributes.course || 0),
    getIcon: () => ({
      url: arrowSvgUrl(),
      width: 64, height: 64, anchorX: 32, anchorY: 32
    }),
    getSize: 18,
    sizeScale: 1,
    sizeMinPixels: 8,
    sizeMaxPixels: 22,
    pickable: false,
    updateTriggers: { getPosition: features }
  });

  deckInstance.setProps({ layers: [scatterLayer, arrowLayer] });
}

let arrowUrl = null;
function arrowSvgUrl() {
  if (arrowUrl) return arrowUrl;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
    <polygon points="32,4 44,56 32,48 20,56" fill="rgba(0,229,255,0.9)" stroke="none"/>
  </svg>`;
  arrowUrl = 'data:image/svg+xml;base64,' + btoa(svg);
  return arrowUrl;
}

function handleHover({ object, x, y }) {
  const tip = document.getElementById('tooltip');
  if (!object) { tip.style.display = 'none'; return; }
  const a = object.attributes;
  const visible = isVisible(object);
  const moving = isMoving(object);
  const lastSeen = a.lastseen ? new Date(a.lastseen).toLocaleString('no-NO') : '—';
  tip.style.display = 'block';
  tip.style.left = (x + 12) + 'px';
  tip.style.top = (y + 12) + 'px';
  tip.innerHTML = `
    <div class="t-name">${a.name || 'Unknown'}</div>
    <div class="t-row"><span class="t-key">Status</span><span class="t-val" style="color:${moving ? 'var(--moving)' : 'var(--stopped)'}">${moving ? '▶ Moving' : '■ Stopped'}</span></div>
    <div class="t-row"><span class="t-key">Visible</span><span class="t-val" style="color:${visible ? '#7fff7f' : 'var(--muted)'}">${visible ? '● Yes' : '○ No'}</span></div>
    <div class="t-row"><span class="t-key">Speed</span><span class="t-val">${(a.speed || 0).toFixed(1)} km/h</span></div>
    <div class="t-row"><span class="t-key">Course</span><span class="t-val">${a.course || 0}°</span></div>
    <div class="t-row"><span class="t-key">Last seen</span><span class="t-val">${lastSeen}</span></div>
    <div class="t-row"><span class="t-key">Type</span><span class="t-val">${a.renderer_value || '—'}</span></div>
  `;
}

function updateStats() {
  const total = features.length;
  const moving = features.filter(isMoving).length;
  document.getElementById('count-total').textContent = total;
  document.getElementById('count-moving').textContent = moving;
  document.getElementById('count-stopped').textContent = total - moving;

  // Build legend from types seen in data
  const seen = new Map(); // rv -> [r,g,b]
  for (const f of features) {
    const rv = (f.attributes.renderer_value || '').toLowerCase().trim();
    if (!seen.has(rv)) seen.set(rv, TYPE_COLORS[rv] || TYPE_COLORS['default']);
  }
  const container = document.getElementById('legend-items');
  container.innerHTML = '';
  for (const [rv, [r,g,b]] of seen.entries()) {
    const label = rv.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()) || 'Unknown';
    const hex = '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
    container.innerHTML += `
      <div class="leg-row">
        <div class="leg-dot" style="background:${hex};box-shadow:0 0 5px ${hex}88"></div>
        <span style="color:var(--text)">${label}</span>
      </div>`;
  }
}

function triggerPulse() {
  const ring = document.getElementById('refresh-ring');
  ring.classList.remove('pulse');
  void ring.offsetWidth;
  ring.classList.add('pulse');
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}
</script>
</body>
</html>
