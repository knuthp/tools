<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norway GTFS Map - Oslo Focus</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/deck.gl@8.9.33/dist.min.js"></script>
    <script src="https://unpkg.com/@zip.js/zip.js@2.7.34/dist/zip.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #111; color: white; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        .control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(20, 20, 20, 0.85);
            padding: 20px;
            border-radius: 8px;
            z-index: 10;
            width: 320px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="map"></div>

    <div id="loading-overlay" class="loading-overlay">
        <div class="spinner mb-4"></div>
        <div id="status-text" class="text-xl font-semibold mb-2">Initializing...</div>
        <div id="progress-bar-container" class="w-64 h-2 bg-gray-700 rounded-full overflow-hidden">
            <div id="progress-bar" class="w-0 h-full bg-blue-500 transition-all duration-300"></div>
        </div>
        <div id="sub-status" class="mt-2 text-sm text-gray-400">Preparing map...</div>
    </div>

    <div class="control-panel">
        <h1 class="text-xl font-bold mb-4">Norway GTFS Explorer</h1>

        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-400 mb-1">CORS Proxy</label>
            <input type="text" id="proxy-url" class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm" value="https://corsproxy.io/?">
            <p class="text-xs text-gray-500 mt-1">Needed if direct access is blocked.</p>
        </div>

        <div class="mb-6">
            <h2 class="text-sm font-bold uppercase tracking-wider text-gray-500 mb-2">Filters</h2>
            <div id="filters" class="space-y-2">
                <!-- Filters will be generated here -->
                <div class="flex items-center">
                    <input type="checkbox" id="filter-stops" checked class="mr-2">
                    <label for="filter-stops">Stops</label>
                </div>
                <div class="flex items-center">
                    <input type="checkbox" id="filter-routes" checked class="mr-2">
                    <label for="filter-routes">Routes</label>
                </div>
            </div>
        </div>

        <div id="stats" class="text-xs text-gray-500">
            <!-- Stats will be shown here -->
        </div>

        <div class="mt-6 flex gap-2">
            <button id="reload-data" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white text-sm font-bold py-2 px-2 rounded transition">
                Reload Data
            </button>
            <button id="clear-cache" class="flex-1 bg-red-600/20 hover:bg-red-600/40 text-red-400 text-sm font-bold py-2 px-2 rounded transition border border-red-900/50">
                Clear Cache
            </button>
        </div>
    </div>

    <script>
        // Configuration
        const GTFS_URL = "https://storage.googleapis.com/marduk-production/outbound/gtfs/rb_norway-aggregated-gtfs.zip";
        const OSLO_BBOX = [10.4, 59.7, 11.1, 60.1]; // [minLon, minLat, maxLon, maxLat]
        const INITIAL_VIEW_STATE = {
            longitude: 10.7522,
            latitude: 59.9139,
            zoom: 12,
            pitch: 45,
            bearing: 0
        };

        // Initialize MapLibre
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
            center: [INITIAL_VIEW_STATE.longitude, INITIAL_VIEW_STATE.latitude],
            zoom: INITIAL_VIEW_STATE.zoom,
            pitch: INITIAL_VIEW_STATE.pitch,
            interactive: false // We'll let Deck.gl handle interaction
        });

        // Initialize Deck.gl
        const deckgl = new deck.DeckGL({
            canvas: map.getCanvas(),
            container: 'map',
            initialViewState: INITIAL_VIEW_STATE,
            controller: true,
            onViewStateChange: ({viewState}) => {
                map.jumpTo({
                    center: [viewState.longitude, viewState.latitude],
                    zoom: viewState.zoom,
                    bearing: viewState.bearing,
                    pitch: viewState.pitch
                });
            },
            layers: []
        });

        // UI State
        const ui = {
            status: document.getElementById('status-text'),
            subStatus: document.getElementById('sub-status'),
            progressBar: document.getElementById('progress-bar'),
            overlay: document.getElementById('loading-overlay')
        };

        function updateProgress(status, subStatus, progress) {
            if (status) ui.status.textContent = status;
            if (subStatus) ui.subStatus.textContent = subStatus;
            if (progress !== undefined) ui.progressBar.style.width = `${progress}%`;
        }

        // IndexedDB Utility
        const DB_NAME = 'GTFS_Cache';
        const DB_VERSION = 1;
        const STORE_NAME = 'datasets';

        const dbRequest = indexedDB.open(DB_NAME, DB_VERSION);
        dbRequest.onupgradeneeded = (event) => {
            const db = event.target.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
                db.createObjectStore(STORE_NAME);
            }
        };

        const getDB = () => new Promise((resolve, reject) => {
            const req = indexedDB.open(DB_NAME, DB_VERSION);
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });

        async function cacheData(key, data) {
            const db = await getDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(STORE_NAME, 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const req = store.put(data, key);
                req.onsuccess = () => resolve();
                req.onerror = () => reject(req.error);
            });
        }

        async function getCachedData(key) {
            const db = await getDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(STORE_NAME, 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const req = store.get(key);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });
        }

        async function clearCache() {
            const db = await getDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(STORE_NAME, 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const req = store.clear();
                req.onsuccess = () => resolve();
                req.onerror = () => reject(req.error);
            });
        }

        // GTFS Processing
        async function loadGTFS() {
            try {
                const cached = await getCachedData('oslo_gtfs');
                if (cached) {
                    updateProgress("Cache Found", "Loading visualization...", 80);
                    renderData(cached);
                    return;
                }

                updateProgress("Downloading GTFS", "Fetching metadata...", 20);
                const proxy = document.getElementById('proxy-url').value;
                const zipReader = new zip.ZipReader(new zip.HttpRangeReader(proxy + GTFS_URL));
                const entries = await zipReader.getEntries();

                updateProgress("Downloading GTFS", "Parsing files...", 30);

                const stopsEntry = entries.find(e => e.filename === "stops.txt");
                const routesEntry = entries.find(e => e.filename === "routes.txt");
                const shapesEntry = entries.find(e => e.filename === "shapes.txt");
                const tripsEntry = entries.find(e => e.filename === "trips.txt");

                if (!stopsEntry) throw new Error("stops.txt not found in ZIP");

                // 1. Process Stops
                updateProgress("Processing Stops", "Filtering for Oslo...", 40);
                const stopsRaw = await stopsEntry.getData(new zip.TextWriter());
                const stops = parseCSV(stopsRaw)
                    .map(s => ({
                        id: s.stop_id,
                        name: s.stop_name,
                        lat: parseFloat(s.stop_lat),
                        lon: parseFloat(s.stop_lon)
                    }))
                    .filter(s =>
                        s.lon >= OSLO_BBOX[0] && s.lon <= OSLO_BBOX[2] &&
                        s.lat >= OSLO_BBOX[1] && s.lat <= OSLO_BBOX[3]
                    );

                const validStopIds = new Set(stops.map(s => s.id));

                // 2. Process Routes
                updateProgress("Processing Routes", "Loading types...", 50);
                const routesRaw = await routesEntry.getData(new zip.TextWriter());
                const routesMap = new Map();
                parseCSV(routesRaw).forEach(r => {
                    routesMap.set(r.route_id, {
                        id: r.route_id,
                        shortName: r.route_short_name,
                        longName: r.route_long_name,
                        type: parseInt(r.route_type),
                        color: r.route_color ? `#${r.route_color}` : '#3b82f6'
                    });
                });

                // 3. Process Trips to link Routes to Shapes
                updateProgress("Processing Trips", "Linking routes to shapes...", 60);
                const tripsRaw = await tripsEntry.getData(new zip.TextWriter());
                const routeToShapeMap = new Map();
                parseCSV(tripsRaw).forEach(t => {
                    if (!routeToShapeMap.has(t.route_id)) {
                        routeToShapeMap.set(t.route_id, new Set());
                    }
                    routeToShapeMap.get(t.route_id).add(t.shape_id);
                });

                // 4. Process Shapes
                updateProgress("Processing Shapes", "Optimizing geometry...", 70);
                const shapesRaw = await shapesEntry.getData(new zip.TextWriter());
                const shapesPointsMap = new Map();
                parseCSV(shapesRaw).forEach(p => {
                    if (!shapesPointsMap.has(p.shape_id)) {
                        shapesPointsMap.set(p.shape_id, []);
                    }
                    shapesPointsMap.get(p.shape_id).push({
                        lat: parseFloat(p.shape_pt_lat),
                        lon: parseFloat(p.shape_pt_lon),
                        seq: parseInt(p.shape_pt_sequence)
                    });
                });

                // Assemble shapes for routes
                const routes = [];
                for (const [routeId, shapeIds] of routeToShapeMap.entries()) {
                    const route = routesMap.get(routeId);
                    if (!route) continue;

                    const routeShapes = [];
                    shapeIds.forEach(shapeId => {
                        const points = shapesPointsMap.get(shapeId);
                        if (points) {
                            points.sort((a, b) => a.seq - b.seq);
                            const path = points.map(p => [p.lon, p.lat]);

                            // Simple check: does this shape pass through Oslo?
                            const inOslo = points.some(p =>
                                p.lon >= OSLO_BBOX[0] && p.lon <= OSLO_BBOX[2] &&
                                p.lat >= OSLO_BBOX[1] && p.lat <= OSLO_BBOX[3]
                            );

                            if (inOslo) {
                                routeShapes.push(path);
                            }
                        }
                    });

                    if (routeShapes.length > 0) {
                        routes.push({
                            ...route,
                            paths: routeShapes
                        });
                    }
                }

                const finalData = { stops, routes, timestamp: Date.now() };
                await cacheData('oslo_gtfs', finalData);

                updateProgress("Complete", "Rendering map...", 100);
                renderData(finalData);

            } catch (err) {
                console.error(err);
                updateProgress("Error", err.message, 0);
                ui.overlay.classList.add('bg-red-900/50');
            }
        }

        function parseCSV(text) {
            const lines = text.trim().split(/\r?\n/);
            const headers = splitCSVLine(lines[0]);
            return lines.slice(1).map(line => {
                const values = splitCSVLine(line);
                const obj = {};
                headers.forEach((h, i) => obj[h] = values[i]);
                return obj;
            });
        }

        function splitCSVLine(line) {
            const result = [];
            let cell = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(cell.trim().replace(/^"|"$/g, ''));
                    cell = '';
                } else {
                    cell += char;
                }
            }
            result.push(cell.trim().replace(/^"|"$/g, ''));
            return result;
        }

        function renderData(data) {
            console.log("Rendering data", data);
            document.getElementById('stats').innerHTML = `
                <p>Stops: ${data.stops.length}</p>
                <p>Routes: ${data.routes.length}</p>
                <p>Last updated: ${new Date(data.timestamp).toLocaleString()}</p>
            `;

            // UI to show filters
            const transportModes = {
                0: { name: 'Tram', color: '#76b041' },
                1: { name: 'Subway', color: '#eb4d4b' },
                2: { name: 'Rail', color: '#f0932b' },
                3: { name: 'Bus', color: '#30336b' },
                4: { name: 'Ferry', color: '#22a6b3' }
            };

            const usedModes = new Set(data.routes.map(r => r.type));
            const filterContainer = document.getElementById('filters');
            filterContainer.innerHTML = '';

            // Standard filters
            ['stops', 'routes'].forEach(id => {
                const div = document.createElement('div');
                div.className = 'flex items-center mb-1';
                div.innerHTML = `
                    <input type="checkbox" id="filter-${id}" checked class="mr-2">
                    <label for="filter-${id}" class="capitalize">${id}</label>
                `;
                filterContainer.appendChild(div);
                document.getElementById(`filter-${id}`).addEventListener('change', updateLayers);
            });

            const modeHeading = document.createElement('h3');
            modeHeading.className = 'text-xs font-bold uppercase mt-4 mb-2 text-gray-600';
            modeHeading.textContent = 'Transport Modes';
            filterContainer.appendChild(modeHeading);

            usedModes.forEach(mode => {
                const info = transportModes[mode] || { name: `Type ${mode}`, color: '#999' };
                const div = document.createElement('div');
                div.className = 'flex items-center';
                div.innerHTML = `
                    <input type="checkbox" id="mode-${mode}" checked class="mr-2 mode-filter" data-mode="${mode}">
                    <label for="mode-${mode}" class="flex items-center">
                        <span class="w-3 h-3 rounded-full mr-2" style="background: ${info.color}"></span>
                        ${info.name}
                    </label>
                `;
                filterContainer.appendChild(div);
                div.querySelector('input').addEventListener('change', updateLayers);
            });

            window.gtfsData = data;
            updateLayers();

            setTimeout(() => {
                ui.overlay.style.display = 'none';
            }, 500);
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? [
                parseInt(result[1], 16),
                parseInt(result[2], 16),
                parseInt(result[3], 16)
            ] : [0, 122, 255];
        }

        function updateLayers() {
            if (!window.gtfsData) return;
            const data = window.gtfsData;

            const showStops = document.getElementById('filter-stops').checked;
            const showRoutes = document.getElementById('filter-routes').checked;

            const activeModes = Array.from(document.querySelectorAll('.mode-filter:checked'))
                .map(el => parseInt(el.dataset.mode));

            const layers = [];

            if (showRoutes) {
                const routePaths = data.routes
                    .filter(r => activeModes.includes(r.type))
                    .flatMap(r => r.paths.map(path => ({
                        path,
                        color: hexToRgb(r.color),
                        name: r.longName || r.shortName,
                        type: r.type
                    })));

                layers.push(new deck.PathLayer({
                    id: 'route-layer',
                    data: routePaths,
                    getPath: d => d.path,
                    getColor: d => d.color,
                    getWidth: 3,
                    widthMinPixels: 2,
                    pickable: true,
                    autoHighlight: true,
                    highlightColor: [255, 255, 255, 100]
                }));
            }

            if (showStops) {
                layers.push(new deck.ScatterplotLayer({
                    id: 'stop-layer',
                    data: data.stops,
                    getPosition: d => [d.lon, d.lat],
                    getFillColor: [255, 255, 255, 200],
                    getRadius: 5,
                    radiusMinPixels: 2,
                    radiusMaxPixels: 10,
                    pickable: true,
                    autoHighlight: true
                }));
            }

            deckgl.setProps({
                layers,
                getTooltip: ({object}) => {
                    if (!object) return null;
                    if (object.name) {
                        return {
                            html: `<div class="p-2 bg-gray-900 text-white rounded border border-gray-700">
                                <b>${object.name}</b>
                                ${object.type !== undefined ? `<br/><span class="text-xs text-gray-400">Type: ${object.type}</span>` : ''}
                            </div>`,
                            style: { backgroundColor: 'transparent' }
                        };
                    }
                    return null;
                }
            });
        }

        // Wait for map to load before starting
        map.on('load', () => {
            updateProgress("Map Ready", "Checking cache...", 10);
            loadGTFS();
        });

        document.getElementById('reload-data').addEventListener('click', () => {
            location.reload();
        });

        document.getElementById('clear-cache').addEventListener('click', async () => {
            if (confirm('Clear cached GTFS data?')) {
                await clearCache();
                location.reload();
            }
        });

    </script>
</body>
</html>
